spring.application.name=chess-lan-backend
server.address=0.0.0.0
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:jdbc:postgresql://localhost:5432/chess_game}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:root}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:Y2hlc3MtbGFuLWJhY2tlbmQtZGV2ZWxvcG1lbnQtc2VjcmV0LWtleS0yMDI2}
jwt.access-token-exp-minutes=${JWT_ACCESS_TOKEN_EXP_MINUTES:30}

springdoc.swagger-ui.path=/swagger-ui.html
