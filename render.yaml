services:
  - type: web
    name: chess-lan-backend
    runtime: docker
    plan: free
    healthCheckPath: /v3/api-docs
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: false
      - key: JPA_FORMAT_SQL
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: chess-lan-postgres
          property: connectionString
